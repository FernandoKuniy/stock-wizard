name: CI

on:
  push:
    branches: [main]
  pull_request:

# If you push again before a run finishes, cancel the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      # setup-uv pins a full version tag on purpose: it no longer publishes moving tags like @v8.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "api/uv.lock"

      # Reads api/.python-version for the Python version and installs from uv.lock.
      # --locked fails the build if uv.lock is out of date with pyproject.toml.
      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      # Exit code 5 means "no tests collected", which is fine until the sim/analysis tests exist.
      - name: Pytest
        run: uv run pytest || [ $? -eq 5 ]

      - name: Prune uv cache
        run: uv cache prune --ci

  frontend:
    name: Frontend (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup must run before setup-node so setup-node can cache the pnpm store.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm exec prettier --check .

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
