name: CI

on:
  push:
    branches: [main]
  pull_request:

# If you push again before a run finishes, cancel the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # App/runtime deps land in requirements.txt during M0. Install them too once it exists.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy .

      - name: Pytest
        # Exit code 5 means "no tests collected", which is fine until the analysis/sim tests exist.
        run: pytest || [ $? -eq 5 ]

  frontend:
    name: Frontend (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        # If the build ever needs runtime env vars, pass dummy ones here or make those pages dynamic.
        run: npm run build