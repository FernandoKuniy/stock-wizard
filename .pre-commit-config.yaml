# Fast checks on staged files before every commit.
# One-time setup:  uv tool install pre-commit  &&  pre-commit install
#
# The heavier checks (mypy, pytest, tsc, next build) run in CI, not here, so
# commits stay fast. Keep the pinned revs below roughly aligned with CI by
# running `pre-commit autoupdate` every so often.

repos:
  # General hygiene plus a basic secret guard.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  # Backend: ruff handles both linting (with autofix) and formatting.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep this in lockstep with the ruff version uv resolves (see api/uv.lock),
    # so the hook and CI's `uv run ruff` never disagree on lint/format.
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
        files: ^api/
      - id: ruff-format
        files: ^api/

  # Frontend: run the project's OWN Prettier (from web/package.json) via a local
  # hook, so pre-commit and CI never drift. A pinned mirror bundles its own
  # prettier version (e.g. prettier/pre-commit v2.0.0 ships prettier 2.0.0) which
  # formats differently from web's prettier 3.x and fights CI. --ignore-unknown
  # skips files prettier can't parse (svg, ico, .env). Needs `pnpm install` in web.
  - repo: local
    hooks:
      - id: prettier
        name: prettier (web)
        entry: bash scripts/pre-commit-prettier.sh
        language: system
        files: ^web/
        exclude: ^web/pnpm-lock\.yaml$
