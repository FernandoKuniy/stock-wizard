# Fast checks on staged files before every commit.
# One-time setup:  pip install pre-commit  &&  pre-commit install
#
# The heavier checks (mypy, pytest, tsc, next build) run in CI, not here, so
# commits stay fast. Keep the pinned revs below roughly aligned with CI by
# running `pre-commit autoupdate` every so often.

repos:
  # General hygiene plus a basic secret guard.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  # Backend: ruff handles both linting (with autofix) and formatting.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^api/
      - id: ruff-format
        files: ^api/

  # Frontend: prettier via prettier's official pre-commit mirror.
  # (The old pre-commit/mirrors-prettier repo was archived in 2024, so do not use it.)
  - repo: https://github.com/prettier/pre-commit
    rev: v2.0.0
    hooks:
      - id: prettier
        files: ^web/